# backend/docker-compose.yml
#version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: modysine_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: mypasswordthatiwonttellanyone
      POSTGRES_DB: modysine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: